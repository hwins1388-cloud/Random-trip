<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>친구 여행지 랜덤 추첨</title>
    <link rel="stylesheet" href="./style.css?v=20260622-yare-name" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="kicker">전국 친구 여행 추첨</p>
          <h1>오늘 어디로 모일까?</h1>
        </div>
        <div class="stat-strip" aria-label="게임 정보">
          <span>친구 8명</span>
          <span>출발지 6곳</span>
          <button id="candidateButton" class="stat-pill candidate-button" type="button">
            여행 후보 <strong id="candidateCount">50곳</strong>
          </button>
        </div>
      </header>

      <section class="game-grid" aria-label="랜덤 여행지 추첨 게임">
        <section class="draw-panel" aria-label="추첨기">
          <div class="machine">
            <div class="wheel-zone">
              <div class="wheel-pointer" aria-hidden="true"></div>
              <div id="wheel" class="wheel" aria-hidden="true">
                <div class="wheel-ring"></div>
                <div class="wheel-core">
                  <img src="./assets/images/roulette-face.png" alt="" />
                </div>
              </div>
              <button id="drawButton" class="primary-button" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M16 3h5v5"></path>
                  <path d="M4 20 21 3"></path>
                  <path d="M21 16v5h-5"></path>
                  <path d="M15 15 21 21"></path>
                  <path d="M4 4l5 5"></path>
                </svg>
                <span>추첨 시작</span>
              </button>
            </div>

            <div class="slot-bank" aria-live="polite">
              <div class="slot-window">
                <span class="slot-caption">권역</span>
                <strong id="slotProvince" class="slot-reel">READY</strong>
              </div>
              <div class="slot-window slot-window-wide">
                <span class="slot-caption">여행지</span>
                <strong id="slotCity" class="slot-reel">PICK</strong>
              </div>
              <div class="slot-window">
                <span class="slot-caption">분위기</span>
                <strong id="slotTag" class="slot-reel">GO</strong>
              </div>
            </div>
          </div>

          <div class="result-board">
            <span class="result-label">선택된 여행지</span>
            <h2 id="destinationName">아직 추첨 전</h2>
            <p id="destinationNote">버튼을 누르면 회전판과 슬롯이 같이 돌아갑니다.</p>
            <div id="resultMeta" class="result-meta" hidden></div>
          </div>
        </section>

        <section class="map-panel" aria-label="대한민국 지도">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">대한민국 지도</p>
              <h2>친구 이름과 당첨지</h2>
            </div>
            <div class="legend">
              <span><i class="origin-dot"></i>친구</span>
              <span><i class="target-dot"></i>당첨지</span>
            </div>
          </div>

          <div id="mapStage" class="map-stage">
            <img class="map-image" src="./assets/images/korea-map.png" alt="대한민국 지도 일러스트" />
            <svg id="routeLayer" class="route-layer" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true"></svg>
            <div id="pinLayer" class="pin-layer" aria-label="친구 출발지 표시"></div>
            <div id="targetLayer" class="target-layer" aria-live="polite"></div>
          </div>
        </section>

        <section class="distance-panel" aria-label="거리 결과">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">거리 계산</p>
              <h2>각자 얼마나 멀까?</h2>
            </div>
            <button id="clearButton" class="ghost-button" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
                <path d="M21 3v6h-6"></path>
              </svg>
              <span>초기화</span>
            </button>
          </div>
          <p id="distanceHint" class="distance-hint">
            추첨 후 친구별 직선거리가 가까운 순서로 정렬됩니다.
          </p>
          <div id="distanceList" class="distance-list"></div>
        </section>
      </section>
    </main>

    <dialog id="candidateDialog" class="candidate-dialog" aria-labelledby="candidateTitle">
      <section class="candidate-sheet">
        <header class="candidate-head">
          <div>
            <p class="eyebrow">여행 후보</p>
            <h2 id="candidateTitle">50곳 전체 보기</h2>
          </div>
          <button id="closeCandidateButton" class="icon-button" type="button" aria-label="후보 목록 닫기">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
          </button>
        </header>
        <div id="candidateList" class="candidate-list"></div>
      </section>
    </dialog>

    <script src="./app.js?v=20260622-three-pin-match"></script>
  </body>
</html>
